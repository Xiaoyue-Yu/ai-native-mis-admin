server:
  port: 8080
  servlet:
    context-path: /api/admin

spring:
  application:
    name: mis-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MIS_DB_URL:jdbc:mysql://localhost:13306/mis_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MIS_DB_USER:mis}
    password: ${MIS_DB_PASSWORD:mis123}
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.creator.mis: INFO
